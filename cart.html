<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carrinho - SUH Modas</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="imagens/favicon.png" />
</head>
<body>
  <header>
    <h1>Seu Carrinho</h1>
    <a class="botao" href="index.html">Voltar ao catálogo</a>
  </header>

  <main>
    <div id="cart-items"></div>
    <p><strong>Total:</strong> R$ <span id="cart-total">0.00</span></p>
    <a href="checkout.html" class="botao">Finalizar Compra</a>
  </main>

  <footer>
    <p>WhatsApp: (11) 97610-9159</p>
    <p>© 2026 SUH Modas • Rafael Marques Medeiros</p>
  </footer>

  <script src="js/cart.js"></script>
  <script>
    function renderCart() {
      const items = getCartItems();
      const container = document.getElementById('cart-items');
      container.innerHTML = '';
      let total = 0;
if (items.length === 0) {
        container.textContent = "Seu carrinho está vazio.";
        document.getElementById('cart-total').textContent = "0.00";
        return;
      }
items.forEach(it => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `${it.name} ${it.size ? '('+it.size+')' : ''} - R$${it.price} x ${it.qty}`;
        container.appendChild(div);
        total += it.price * it.qty;
      }); 
      document.getElementById('cart-total').textContent = total.toFixed(2);
    }
document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
