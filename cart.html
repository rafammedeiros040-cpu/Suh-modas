<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Carrinho - SUH Modas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Seu Carrinho</h1>
    <a class="botao" href="index.html">Voltar ao catálogo</a>
    <a class="botao" href="checkout.html">Finalizar compra</a>
  </header>

  <main>
    <div id="cart-container"></div>
    <p><strong>Total:</strong> R$ <span id="cart-total">0.00</span></p>
    <button class="botao" onclick="clearCart(); renderCart();">Limpar carrinho</button>
  </main>

  <footer>
    <p>WhatsApp: (11) 97610-9159</p>
    <p>© 2026 SUH Modas • Rafael Marques Medeiros</p>
  </footer>

  <!-- Script do carrinho -->
  <script src="js/cart.js"></script>
  <script>
    function renderCart() {
      const items = getCartItems();
      const container = document.getElementById('cart-container');
      container.innerHTML = '';
      let total = 0;

      if (items.length === 0) {
        container.textContent = "Seu carrinho está vazio.";
        document.getElementById('cart-total').textContent = "0.00";
        return;
      }

      items.forEach(it => {
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <p>${it.name} ${it.size ? '(' + it.size + ')' : ''} - R$${it.price} x ${it.qty}</p>
          <button onclick="removeFromCart('${it.id}'); renderCart();">Remover</button>
        `;
        container.appendChild(div);
        total += it.price * it.qty;
      });

      document.getElementById('cart-total').textContent = total.toFixed(2);
    }

    document.addEventListener('DOMContentLoaded', renderCart);
  </script>
</body>
</html>
