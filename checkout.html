<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Checkout - SUH Modas</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <header>
    <h1>Finalizar Compra</h1>
    <a class="botao" href="cart.html">Voltar ao carrinho</a>
  </header>

  <main>
    <h2>Resumo do Pedido</h2>
    <div id="checkout-items"></div>
    <p><strong>Total:</strong> R$ <span id="checkout-total">0.00</span></p>

    <h2>Dados do Cliente</h2>
    <form id="checkout-form">
      <label>Nome: <input type="text" id="nome" required></label><br>
      <label>CEP: <input type="text" id="cep" required></label><br>
      <label>Endereço: <input type="text" id="endereco" required></label><br>
      <label>Forma de pagamento:
        <select id="pagamento">
          <option>Pix</option>
          <option>Cartão</option>
          <option>Boleto</option>
        </select>
      </label><br>
      <button type="submit" class="botao">Confirmar Pedido</button>
    </form>
  </main>

  <footer>
    <p>WhatsApp: (11) 97610-9159</p>
  </footer>

  <script src="js/cart.js"></script>
  <script>
    function renderCheckout() {
      const items = getCartItems();
      const container = document.getElementById('checkout-items');
      container.innerHTML = '';
      let total = 0;

      if (items.length === 0) {
        container.textContent = "Seu carrinho está vazio.";
        document.getElementById('checkout-total').textContent = "0.00";
        return;
      }

      items.forEach(it => {
        const div = document.createElement('div');
        div.className = 'checkout-item';
        div.innerHTML = `${it.name} ${it.size ? '('+it.size+')' : ''} - R$${it.price} x ${it.qty}`;
        container.appendChild(div);
        total += it.price * it.qty;
      });

      document.getElementById('checkout-total').textContent = total.toFixed(2);
    }

    document.addEventListener('DOMContentLoaded', renderCheckout);

    document.getElementById('checkout-form').addEventListener('submit', e => {
      e.preventDefault();
      alert("Pedido confirmado! Entraremos em contato pelo WhatsApp.");
      clearCart();
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
